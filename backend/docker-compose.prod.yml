services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_NAME: ${APP_NAME}
      APP_ENV: production
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - '${APP_PORT}:${APP_PORT}'
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port ${APP_PORT}"
